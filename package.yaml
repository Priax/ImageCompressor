name:        imageCompressor
version:     0.1.0.0
synopsis:    K-means image color compressor
description: See README.md
github:      "priax/imageCompressor"
license:     BSD-3-Clause
author:      "Vincent Montero-Fontaine"
maintainer:  "vincent.montero-fontaine@epitech.eu"
copyright:   "2024 Vincent Montero-Fontaine"

extra-source-files:
  - README.md
  - CHANGELOG.md

dependencies:
  - base >= 4.7 && < 5
  - bytestring >= 0.11
  - containers >= 0.6
  - vector     >= 0.13
  - random     >= 1.2

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wpartial-fields
  - -Wredundant-constraints

default-extensions:
  - BangPatterns
  - OverloadedStrings

library:
  source-dirs: src

executables:
  imageCompressor:
    main:        Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -O2
    dependencies:
      - imageCompressor

tests:
  imageCompressor-test:
    main:        Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - imageCompressor
